<div class="formula-card">

<div class="formula-icon">

<i class="fa-regular fa-circle"></i>

</div>

<h2>Circle</h2>

<h3>A = πr²</h3>

<p>Enter the radius.</p>

<input
type="number"
id="circleRadius"
placeholder="Radius">

<button onclick="calculateCircleArea()">

Calculate

</button>

<div class="result"
id="circleResult">

Result:

</div>

</div>

<!--================ SQUARE ================-->

<div class="formula-card">

<div class="formula-icon">

<i class="fa-regular fa-square"></i>

</div>

<h2>Square</h2>

<h3>A = s²</h3>

<p>Enter the side length.</p>

<input
type="number"
id="squareSide"
placeholder="Side Length">

<button onclick="calculateSquareArea()">

Calculate

</button>

id="squareResult">

Result:
